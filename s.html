        }
        .out-of-stock-badge {
            display: none;
            background: #ef4444;

            padding: 1px 6px;
            border-radius: 9999px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Toast Notification Styles */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 420px;
            width: 100%;
            pointer-events: none;
        }

        .toast {
            padding: 16px 20px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideInRight 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
            background: rgba(0,0,0,0.9);
        }

        .toast-success {
            border-left: 4px solid #10B981;
        }

        .toast-error {
            border-left: 4px solid #EF4444;
        }

        .toast-info {
            border-left: 4px solid #3B82F6;
        }

        .toast-warning {
            border-left: 4px solid #F59E0B;
        }

        .toast-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .toast-success .toast-icon {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }

        .toast-error .toast-icon {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        .toast-info .toast-icon {
            background: rgba(59, 130, 246, 0.2);
            color: #3B82F6;
        }

        .toast-warning .toast-icon {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .toast-message {
            font-size: 13px;
            opacity: 0.9;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .toast-close {
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            padding: 0 4px;
            line-height: 1;
        }

        .toast-close:hover {
            opacity: 1;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        .toast-hide {
            animation: slideOutRight 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;

<script>
// ===================== NOTIFICATION SYSTEM =====================
function showToast(message, type = 'info', title = '') {
    const container = document.getElementById('toastContainer');
    
    if (!container) return;
    
    // Set default titles based on type
    const titles = {
        success: '✅ Berhasil!',
        error: '❌ Gagal!',
        warning: '⚠️ Peringatan',
        info: 'ℹ️ Informasi'
    };
    
    const finalTitle = title || titles[type] || 'Informasi';
    
    // Icon mapping
    const icons = {
        success: '✅',
        error: '❌',
        warning: '⚠️',
        info: 'ℹ️'
    };
    
    // Create toast element
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    
    toast.innerHTML = `
        <div class="toast-icon">${icons[type] || 'ℹ️'}</div>
        <div class="toast-content">
            <div class="toast-title">${finalTitle}</div>
            <div class="toast-message">${message}</div>
        </div>
        <button class="toast-close" onclick="this.parentElement.remove()">×</button>
    `;
    
    container.appendChild(toast);
    
    // Auto remove after 4.5 seconds
    setTimeout(() => {
        if (toast.parentElement) {
            toast.classList.add('toast-hide');
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.remove();
                }
            }, 400);
        }
    }, 4500);
}

    };
}

// ===================== UPDATE CASHIER DISPLAY =====================
function updateCashierDisplay() {
    const profile = getCashierProfile();
    const nameEl = document.getElementById('cashierNameDisplay');
    const avatarEl = document.getElementById('cashierAvatarDisplay');
    if (nameEl) nameEl.textContent = profile.name;
    if (avatarEl) avatarEl.src = profile.avatar;
}

// ===================== LOAD DATA =====================
function loadProductsFromStorage() {
    try {
        const saved = localStorage.getItem('pos_products');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed && parsed.length > 0) {
                products = parsed;
                return true;
            }
        }
    } catch(e) {}
    return false;
}

// ===================== GET CASH IN DRAWER FROM SHIFT =====================
function getCashInDrawer() {
    try {
        const savedShift = localStorage.getItem('shift_state');
        if (savedShift) {
            const shift = JSON.parse(savedShift);
            if (shift && shift.isActive) {
                const balance = (shift.modalAwal || 0) + (shift.cashIncome || 0);
                return balance;
            }
        }
        const saved = localStorage.getItem('cash_drawer');
        if (saved) {
            return parseInt(saved) || 0;
        }
    } catch(e) {}
    return 0;
}

// ===================== RENDER FUNCTIONS =====================
function renderProducts(filteredProducts) {
    const grid = document.getElementById('productGrid');
    const productsToRender = filteredProducts || products;

    if (productsToRender.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full text-center py-12 text-on-surface-variant">
                <span class="material-symbols-outlined text-4xl block mb-2">inventory_2</span>
                <p class="font-body-lg">Tidak ada produk</p>
                <p class="font-body-md text-on-surface-variant/60">Tambahkan produk di halaman Produk</p>
            </div>
        `;
        return;
    }

    grid.innerHTML = productsToRender.map(p => {
        const isOutOfStock = p.status === 'habis' || p.stock <= 0;
        const stockLabel = isOutOfStock ? 'Habis' : `Stok: ${p.stock}`;
        
        return `
            <div class="bg-white rounded-xl overflow-hidden shadow-xl hover:translate-y-[-4px] transition-transform ${isOutOfStock ? 'product-out-of-stock' : 'cursor-pointer'}" 
                 data-category="${p.category}" 
                 data-name="${p.name}" 
                 data-price="${p.price}"
                 data-id="${p.id}"
                 data-stock="${p.stock}">
                <img class="w-full aspect-[4/3] object-cover" src="${p.image}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1551030173-1225a8a0f1f0?w=100&h=100&fit=crop'">
                <div class="p-card-padding">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-headline-md text-headline-md text-surface">${p.name}</h3>
                            <p class="text-xs text-surface-variant/70 mt-1">${p.sku}</p>
                        </div>
                        <span class="out-of-stock-badge bg-error text-white text-[8px] px-2 py-0.5 rounded-full font-bold uppercase">Habis</span>
                    </div>
                    <div class="flex justify-between items-center mt-4">
                        <div>
                            <p class="font-price-display text-price-display text-secondary">${formatPrice(p.price)}</p>
                            <p class="text-[10px] text-on-surface-variant/60">${stockLabel}</p>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// ===================== FILTER & SEARCH =====================
// Category filter
document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('[data-filter]').forEach(b => {
            b.classList.remove('bg-secondary', 'text-white', 'ring-2', 'ring-secondary/20');
            b.classList.add('bg-white', 'text-surface');
        });
        this.classList.add('bg-secondary', 'text-white', 'ring-2', 'ring-secondary/20');
        this.classList.remove('bg-white', 'text-surface');

        const filter = this.dataset.filter;
        if (filter === 'all') {
            renderProducts(products);
            showToast('Menampilkan semua produk', 'info', '🔄 Filter');
        } else {
            const filtered = products.filter(p => p.category === filter);
            renderProducts(filtered);
            showToast(`Menampilkan ${filtered.length} produk kategori ${filter}`, 'info', '🏷️ Filter');
        }
    });
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
    const term = this.value.toLowerCase().trim();
    const filtered = products.filter(p => 
        p.name.toLowerCase().includes(term) || 
        p.sku.toLowerCase().includes(term)
    );
    renderProducts(filtered);
    if (term.length > 0 && filtered.length === 0) {
        showToast('Tidak ada produk yang cocok dengan pencarian', 'warning', '🔍 Tidak Ditemukan');
    }
});

// ===================== LOAD STATS FROM localStorage =====================
function loadStats() {
    try {
        const savedStats = localStorage.getItem('pos_stats');
        if (savedStats) {
            const stats = JSON.parse(savedStats);
            const count = stats.count || 0;
            const sales = stats.sales || 0;
            
            document.getElementById('transactionCount').textContent = count;
            document.getElementById('totalTransactions').textContent = formatPrice(sales);
            
            if (count > 0) {
                const avg = Math.round(sales / count);
                document.getElementById('averageTransaction').textContent = formatPrice(avg);
            }
        }
    } catch(e) {}
}

// ===================== UPDATE CASH DRAWER =====================
function updateCashDrawer() {
    const cashInDrawer = getCashInDrawer();
    document.getElementById('cashInDrawer').textContent = formatPrice(cashInDrawer);
}

// ===================== NOTIFICATION BELL =====================
document.getElementById('notificationBell').addEventListener('click', function() {
    showToast('📋 Dashboard Little Story ERP siap digunakan!', 'success', '✅ Sistem Aktif');
});

// ===================== PRODUCT CLICK NOTIFICATION =====================
document.addEventListener('click', function(e) {
    const productCard = e.target.closest('.bg-white.rounded-xl.overflow-hidden:not(.product-out-of-stock)');
    if (productCard && productCard.dataset) {
        const name = productCard.dataset.name;
        const price = productCard.dataset.price;
        const stock = productCard.dataset.stock;
        if (name && price) {
            showToast(
                `${name}\n💰 ${formatPrice(parseInt(price))} | 📦 Stok: ${stock}`,
                'info',
                '🛒 Produk Dipilih'
            );
        }
    }
});

// ===================== INIT =====================
// Load products from localStorage
if (!loadProductsFromStorage()) {
    products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    try {
        localStorage.setItem('pos_products', JSON.stringify(products));
        showToast('Data produk default berhasil dimuat', 'success', '✅ Inisialisasi');
    } catch(e) {}
} else {
    showToast('Data produk berhasil dimuat dari penyimpanan', 'success', '✅ Memuat Data');
}

// Update cashier display
updateCashierDisplay();

// Render products and stats
renderProducts();
loadStats();
updateCashDrawer();

// Welcome notification after page load
setTimeout(() => {
    const profile = getCashierProfile();
    showToast(
        `Selamat datang, ${profile.name}! Dashboard siap digunakan.`,
        'success',
        '👋 Selamat Datang'
    );
}, 1000);

// Sinkronisasi otomatis setiap 3 detik
let lastProductCount = products.length;
setInterval(() => {
    if (loadProductsFromStorage()) {
        if (products.length !== lastProductCount) {
            renderProducts();
            showToast(`Data produk diperbarui (${products.length} produk)`, 'info', '🔄 Sinkronisasi');
            lastProductCount = products.length;
        } else {
            renderProducts();
        }
    }
    loadStats();
    updateCashDrawer();
    updateCashierDisplay();
}, 3000);

// ===================== MICRO-INTERACTIONS =====================
document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mousedown', () => {
        el.classList.add('scale-95');
    });
    el.addEventListener('mouseup', () => {
        el.classList.remove('scale-95');
    });
    el.addEventListener('mouseleave', () => {
        el.classList.remove('scale-95');
    });
});

// Search bar focus effect
const searchInput = document.querySelector('input[type="text"]');
if (searchInput) {
    searchInput.addEventListener('focus', () => {
        searchInput.parentElement.classList.add('ring-2', 'ring-primary/50');
    });
    searchInput.addEventListener('blur', () => {
        searchInput.parentElement.classList.remove('ring-2', 'ring-primary/50');
    });
}
</script>
