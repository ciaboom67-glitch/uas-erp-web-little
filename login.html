</span>
<input class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-brand-primary focus:border-brand-primary text-sm" id="username" placeholder="Contoh: kasir_lstory" type="text">

</div>
<div>

<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>

<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-brand-primary hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary" type="submit">
<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>

<!-- Role Selection Section -->
<div class="mt-8">
<div class="relative mb-6">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white text-gray-400">Perhatikan!</span>

<h3 class="text-sm font-semibold text-gray-700 mb-4">yang dapat menggunakan Website ini</h3>
<div class="grid grid-cols-4 gap-3">
<!-- Role: Manajemen -->

<div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center mb-2 group-hover:bg-purple-200"><img src="https://cdn-icons-png.flaticon.com/512/1654/1654220.png" ></div>

<script class="">
  // Daftar akun untuk semua peran
  const accounts = {
    'manajer_lstory': { password: 'manajer123', role: 'manajer', redirect: 'manajer.html' },
    'gudang_lstory': { password: 'gudang123', role: 'gudang', redirect: 'gudang.html' },
    'kasir_lstory': { password: 'lstory123', role: 'kasir', redirect: 's.html' },
    'pemilik_lstory': { password: 'pemilik123', role: 'pemilik', redirect: 'pemilik.html' }
  };

  // Fungsi login
  function performLogin(username, password) {
    if (accounts[username] && accounts[username].password === password) {
      // Login berhasil
      window.location.href = accounts[username].redirect;
      return true;
    } else {
      alert('Username atau password salah. Silakan coba lagi.');
      return false;
    }
  }

  // Event listener untuk form login
  document.querySelector('[data-purpose="main-login-form"]').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    performLogin(user, pass);
  });

  // Event listener untuk role cards
  document.querySelectorAll('[data-purpose="role-card"]').forEach(button => {
    button.addEventListener('click', function() {
      const username = this.getAttribute('data-username');
      const password = this.getAttribute('data-password');
      
      // Isi form dengan data role
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      
      // Otomatis login
      performLogin(username, password);
    });
  });

  // Tampilkan info akun di console untuk referensi
  console.log('=== Akun Little Story ERP ===');
  console.log('Manajer: manajer_lstory / manajer123');
  console.log('Gudang: gudang_lstory / gudang123');
  console.log('Kasir: kasir_lstory / lstory123');
  console.log('Pemilik: pemilik_lstory / pemilik123');
  console.log('=============================');
</script></body></html>
